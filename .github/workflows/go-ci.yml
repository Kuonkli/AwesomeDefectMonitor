name: Go CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.5'

      - name: Verify go modules
        run: |
          echo "Verifying gateway-service..."
          cd gateway_service && go mod download
          
          echo "Verifying user-service..."
          cd ../user_service && go mod download
          
          echo "Verifying projects-service..."
          cd ../projects_service && go mod download

      - name: Lint code
        run: |
          go install golang.org/x/lint/golint@latest
          
          echo "Linting gateway_service..."
          cd gateway_service && golint ./...
          
          echo "Linting user_service..."
          cd ../user_service && golint ./...
          
          echo "Linting projects_service..."
          cd ../projects_service && golint ./...

      - name: Build services
        run: |
          echo "Building gateway_service..."
          cd gateway_service && go build -v ./...
          
          echo "Building user-service..."
          cd ../user_service && go build -v ./...
          
          echo "Building projects_service..."
          cd ../projects_service && go build -v ./...

      - name: Run unit tests
        run: |
          echo "Testing gateway_service..."
          cd gateway_service && go test ./... -v || echo "No tests in gateway-service"
          
          echo "Testing user_service..."
          cd ../user_service && go test ./... -v || echo "No tests in user-service"
          
          echo "Testing projects_service..."
          cd ../projects_service && go test ./... -v || echo "No tests in projects-service"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-binaries
          path: |
            gateway_service/
            user_service/
            projects_service/
          retention-days: 1